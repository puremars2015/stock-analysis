<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}台股分析系統{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-link { padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background-color 150ms ease; }
        .nav-link:hover { background-color: rgb(29 78 216); }
        .nav-link.active { background-color: rgb(37 99 235); }
        .card { background: #fff; border-radius: 0.75rem; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); border: 1px solid rgb(243 244 246); padding: 1.5rem; }
        .btn-primary { background-color: rgb(37 99 235); color: #fff; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background-color 150ms ease; }
        .btn-primary:hover { background-color: rgb(29 78 216); }
        .btn-secondary { background-color: rgb(243 244 246); color: rgb(55 65 81); padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background-color 150ms ease; }
        .btn-secondary:hover { background-color: rgb(229 231 235); }
        .stat-up { color: rgb(239 68 68); }
        .stat-down { color: rgb(34 197 94); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold">台股分析系統</a>
                    <div class="hidden md:flex space-x-2">
                        <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">首頁</a>
                        <a href="/stock" class="nav-link {% if request.endpoint == 'stock' %}active{% endif %}">個股查詢</a>
                        <a href="/indicator" class="nav-link {% if request.endpoint == 'indicator_page' %}active{% endif %}">技術指標</a>
                        <a href="/screener" class="nav-link {% if request.endpoint == 'screener_page' %}active{% endif %}">選股器</a>
                        <a href="/backtest" class="nav-link {% if request.endpoint == 'backtest_page' %}active{% endif %}">回測</a>
                    </div>
                </div>
                <div class="text-sm text-blue-200">
                    {{ now().strftime("%Y-%m-%d %H:%M") if now else "" }}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            <p>台股分析系統 &copy; 2024 | 資料來源：FinMind API</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
